<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Transcription Service</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>ClearFrame</h1>
            <p class="subtitle">Speaker-diarized transcription with AI</p>
        </header>

        <main>
            <!-- Input Section -->
            <section class="input-section">
                <h2>Enter YouTube URL</h2>
                <form id="transcribeForm">
                    <div class="form-group">
                        <label for="youtubeUrl">YouTube URL:</label>
                        <input
                            type="text"
                            id="youtubeUrl"
                            name="youtubeUrl"
                            placeholder="https://www.youtube.com/watch?v=..."
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="language">Language:</label>
                        <select id="language" name="language">
                            <option value="">Auto-detect</option>
                            <option value="en">English</option>
                            <option value="th">Thai</option>
                        </select>
                    </div>

                    <button type="submit" id="submitBtn" class="btn btn-primary">
                        Transcribe Video
                    </button>
                </form>
            </section>

            <!-- Loading Indicator -->
            <div id="loadingIndicator" class="loading-indicator" style="display: none;">
                <div class="spinner"></div>
                <p>Processing video... This may take a few minutes.</p>
                <p class="loading-step" id="loadingStep">Initializing...</p>
            </div>

            <!-- Error Display -->
            <div id="errorDisplay" class="error-display" style="display: none;">
                <h3>Error</h3>
                <p id="errorMessage"></p>
            </div>

            <!-- Results Section -->
            <section id="resultsSection" class="results-section" style="display: none;">
                <h2>Results</h2>

                <!-- Video Info -->
                <div class="video-info">
                    <h3 id="videoTitle"></h3>
                    <div class="video-meta">
                        <span class="meta-item">
                            <strong>Duration:</strong> <span id="videoDuration"></span>
                        </span>
                        <span class="meta-item">
                            <strong>Language:</strong> <span id="videoLanguage"></span>
                        </span>
                        <span class="meta-item">
                            <strong>Speakers:</strong> <span id="totalSpeakers"></span>
                        </span>
                    </div>
                </div>

                <!-- YouTube Player -->
                <div id="videoPlayer" class="video-player"></div>

                <!-- Transcript -->
                <div class="transcript-container">
                    <div class="transcript-header">
                        <h3>Transcript with Speaker Labels</h3>
                        <button id="copyTranscript" class="btn btn-secondary">Copy Transcript</button>
                    </div>
                    <div id="transcript" class="transcript"></div>
                </div>
            </section>
        </main>

        <footer>
            <p>Powered by FastAPI, Whisper, and pyannote.audio</p>
        </footer>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
