version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: youtube-transcription-service
    ports:
      - "8000:8000"
    environment:
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN}
      - TEMP_DIR=/app/temp
      - MODELS_DIR=/app/models
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE:-base}
      - MAX_VIDEO_LENGTH_MINUTES=${MAX_VIDEO_LENGTH_MINUTES:-120}
      - SUPPORTED_LANGUAGES=${SUPPORTED_LANGUAGES:-en,th}
      - HOST=0.0.0.0
      - PORT=8000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      # Mount temp directory for audio files
      - ./temp:/app/temp
      # Mount models directory to persist downloaded models
      - ./models:/app/models
      # Optional: Mount app code for development (comment out for production)
      # - ./app:/app/app
      # - ./static:/app/static
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Uncomment the following section if you have a GPU and want to use it
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

# Optional: Add volumes for better data persistence
volumes:
  temp_data:
  models_data:
